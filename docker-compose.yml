# Локальная разработка: MySQL 8 + Redis 7.
# Запуск: docker compose up -d, затем npm run dev.
services:
  mysql:
    image: mysql:8
    container_name: dialog-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dialog
      MYSQL_USER: dialog
      MYSQL_PASSWORD: dialog
    ports:
      - "3306:3306"
    volumes:
      - dialog-mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: dialog-redis
    ports:
      - "6379:6379"

volumes:
  dialog-mysql-data:
