name: Build Android (.apk)

# Builds the Android release APK and uploads it to the GitHub Release.
# A keystore is generated on the fly (ephemeral) so the APK is signed and
# installable. For stable update signing, provide a real keystore via secrets
# (ANDROID_KEYSTORE_B64 + passwords) and adapt the "Prepare keystore" step.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload the APK to"
        required: true
        default: "v1.0.1"
  push:
    tags:
      - "apk-*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Prepare signing keystore
        id: ks
        run: |
          KS="$RUNNER_TEMP/dialog.keystore"
          keytool -genkeypair -v -keystore "$KS" -storepass dialog123 \
            -keypass dialog123 -alias dialog -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Dialog, O=Dialog, C=US"
          echo "path=$KS" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: android
        env:
          DIALOG_KEYSTORE: ${{ steps.ks.outputs.path }}
          DIALOG_KS_PASS: dialog123
          DIALOG_KEY_ALIAS: dialog
          DIALOG_KEY_PASS: dialog123
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Stage APK
        id: stage
        run: |
          VER=$(grep -oP 'versionName\s*=\s*"\K[^"]+' android/app/build.gradle.kts)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          mkdir -p out
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Built: $APK (v$VER)"
          cp "$APK" "out/Dialog-${VER}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: dialog-android
          path: out/*.apk

      - name: Attach APK to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || format('v{0}', steps.stage.outputs.version) }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "Dialog $TAG" --notes "Release"
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber out/*.apk
