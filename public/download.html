<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Dialog</title>
  <meta name="description" content="Download the Dialog messenger for Windows, macOS, Linux and Android — or use the browser version." />
  <meta name="theme-color" content="#00ff5a" />
  <link rel="icon" href="/src/lil_dialog.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>

  <nav class="nav">
    <div class="wrap">
      <a class="brand-row" href="/"><img src="/src/lil_dialog.webp" alt="" /><span>DIALOG</span></a>
      <div class="nav-links">
        <a href="/#features">Features</a>
        <a href="/download">Download</a>
        <a class="nav-cta" href="/login">Open Dialog</a>
      </div>
    </div>
  </nav>

  <header class="hero wrap" style="padding-bottom:30px;">
    <h1 style="font-size:clamp(32px,5vw,52px);">Download <span class="grad">Dialog</span></h1>
    <p class="sub" id="recoLine">Pick your platform below — or use Dialog right in your browser.</p>
    <div class="hero-cta">
      <a class="btn btn-ghost" href="/login">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18"/></svg>
        Use in browser instead
      </a>
    </div>
  </header>

  <section class="wrap" style="padding-top:20px;">
    <div class="dl-grid" id="dlGrid"></div>
    <p style="text-align:center;color:var(--muted);font-size:13px;margin-top:34px;">
      All builds are version <span id="ver"></span>. Linux AppImage runs on any distro
      (<code>chmod +x</code> then run). On Flathub soon.
    </p>
  </section>

  <footer class="footer">
    <div class="wrap">
      <span>© <span id="yr"></span> Dialog · v<span id="ver2"></span></span>
      <div style="display:flex; gap:18px;">
        <a href="/">Home</a>
        <a href="/login">Sign in</a>
      </div>
    </div>
  </footer>

  <script src="/js/downloads-data.js"></script>
  <script>
    (function () {
      var D = window.DialogDownloads;
      document.getElementById("ver").textContent = D.VERSION;
      document.getElementById("ver2").textContent = D.VERSION;
      document.getElementById("yr").textContent = new Date().getFullYear();

      var OS_ICONS = {
        windows: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 5.5L10.5 4.5v7H3zM10.5 12.5v7L3 18.5v-6zM11.5 4.3L21 3v8.5h-9.5zM21 12.5V21l-9.5-1.3V12.5z"/></svg>',
        apple: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.4 12.8c0-2.3 1.9-3.4 2-3.5-1.1-1.6-2.8-1.8-3.4-1.8-1.4-.1-2.8.8-3.5.8s-1.8-.8-3-.8c-1.5 0-3 .9-3.8 2.3-1.6 2.8-.4 7 1.2 9.3.8 1.1 1.7 2.4 2.9 2.3 1.2 0 1.6-.7 3-.7s1.8.7 3 .7 2-1 2.8-2.1c.9-1.3 1.2-2.5 1.3-2.6-.1 0-2.5-1-2.5-3.9zM14.3 6c.6-.8 1-1.9.9-3-.9 0-2 .6-2.7 1.4-.6.7-1.1 1.8-1 2.8 1 .1 2.1-.5 2.8-1.2z"/></svg>',
        linux: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-2 0-3 1.8-3 4 0 1.3.3 2 .3 3-.6.8-2 2.2-2.6 3.6-.7 1.5-1.6 3-2.3 3.7-.5.5-.5 1.2 0 1.5.4.2 1 .2 1.3.6.3.4.2 1 .7 1.3.8.4 1.8-.3 2.7-.3.7 0 1.3.3 2 .3s1.3-.3 2-.3c.9 0 1.9.7 2.7.3.5-.3.4-.9.7-1.3.3-.4.9-.4 1.3-.6.5-.3.5-1 0-1.5-.7-.7-1.6-2.2-2.3-3.7-.6-1.4-2-2.8-2.6-3.6 0-1 .3-1.7.3-3 0-2.2-1-4-3-4zm-1.4 4.2c.4 0 .7.4.7.9s-.3.9-.7.9-.7-.4-.7-.9.3-.9.7-.9zm2.8 0c.4 0 .7.4.7.9s-.3.9-.7.9-.7-.4-.7-.9.3-.9.7-.9z"/></svg>',
        android: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 9v7a1.5 1.5 0 001.5 1.5H8V21a1 1 0 002 0v-3.5h4V21a1 1 0 002 0v-3.5h.5A1.5 1.5 0 0018 16V9zM4.5 9A1.5 1.5 0 003 10.5v4a1.5 1.5 0 003 0v-4A1.5 1.5 0 004.5 9zm15 0a1.5 1.5 0 00-1.5 1.5v4a1.5 1.5 0 003 0v-4A1.5 1.5 0 0019.5 9zM7 8h10c0-2.2-1.3-4-3.2-4.8l1-1.6a.4.4 0 10-.7-.4l-1.1 1.7A6 6 0 0012 2.4c-.7 0-1.4.1-2 .4L8.9 1.1a.4.4 0 10-.7.4l1 1.6C7.3 4 6 5.8 6 8zm2.5-2.2a.6.6 0 110-1.2.6.6 0 010 1.2zm5 0a.6.6 0 110-1.2.6.6 0 010 1.2z"/></svg>'
      };
      var DLICON = '<svg class="dl-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>';

      var os = D.detectOS();
      var grid = document.getElementById("dlGrid");
      var order = Object.keys(D.PLATFORMS);
      // Put the detected platform first.
      if (D.PLATFORMS[os]) order = [os].concat(order.filter(function (k) { return k !== os; }));

      if (os === "ios") {
        document.getElementById("recoLine").innerHTML =
          "There's no iOS app yet — <a style=\"color:var(--green)\" href=\"/login\">use Dialog in your browser</a>. Native builds below.";
      } else if (D.PLATFORMS[os]) {
        document.getElementById("recoLine").innerHTML =
          "We detected <b style=\"color:var(--green)\">" + D.PLATFORMS[os].label + "</b> — recommended download is highlighted.";
      }

      order.forEach(function (key) {
        var p = D.PLATFORMS[key];
        var recommended = key === os;
        var items = p.installers.map(function (i) {
          return '<a class="dl-item ' + (i.primary ? "primary" : "") + '" href="' + D.url(i.file) + '" download>' +
                 '<span>' + i.kind + '</span>' + DLICON + '</a>';
        }).join("");
        var card = document.createElement("div");
        card.className = "dl-card" + (recommended ? " recommended" : "");
        card.innerHTML =
          (recommended ? '<span class="reco-tag">RECOMMENDED FOR YOU</span>' : "") +
          '<div class="os-ic">' + (OS_ICONS[p.icon] || "") + "</div>" +
          "<h3>" + p.label + "</h3>" +
          '<div class="note">' + p.note + "</div>" +
          '<div class="dl-list">' + items + "</div>";
        grid.appendChild(card);
      });
    })();
  </script>
</body>
</html>
