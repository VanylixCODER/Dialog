services:
  app:
    build: .
    container_name: dialog-app
    restart: unless-stopped
    env_file: .env
    environment:
      - HOST_REPO_PATH=/repo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ubuntu/.ssh:/root/.ssh:ro
      - /home/ubuntu/dialog:/repo
      # App downloads (installers + electron-updater latest-*.yml) served live
      # from an ubuntu-owned folder OUTSIDE the repo, so uploads need no sudo and
      # git/deploy never touches them. Create it first: mkdir -p /home/ubuntu/dl
      - /home/ubuntu/dl:/app/public/dl
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    image: caddy:2
    container_name: dialog-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - dialog-caddy-data:/data
    depends_on:
      - app

  mysql:
    image: mysql:8
    container_name: dialog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - dialog-mysql-data:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u root -p${MYSQL_ROOT_PASSWORD}
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: dialog-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - dialog-redis-data:/data

volumes:
  dialog-mysql-data:
  dialog-redis-data:
  dialog-certs:
  dialog-caddy-data:
