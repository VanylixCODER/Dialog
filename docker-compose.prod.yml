services:
  app:
    build: .
    container_name: dialog-app
    restart: unless-stopped
    env_file: .env
    environment:
      - HOST_REPO_PATH=/repo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ubuntu/.ssh:/root/.ssh:ro
      - /home/ubuntu/dialog:/repo
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    image: caddy:2
    container_name: dialog-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - dialog-caddy-data:/data
    depends_on:
      - app

  mysql:
    image: mysql:8
    container_name: dialog-mysql
    restart: unless-stopped
    # Low-memory tuning for the 1 GB box. The big saver is performance_schema=OFF
    # (~150-300 MB) + O_DIRECT (no double-caching with the OS). Keeping MySQL in
    # real RAM avoids swap thrash, which is what actually slows queries here.
    command: >
      --performance-schema=OFF
      --innodb-buffer-pool-size=128M
      --innodb-buffer-pool-instances=1
      --innodb-log-buffer-size=8M
      --innodb-flush-method=O_DIRECT
      --max-connections=60
      --table-open-cache=256
      --tmp-table-size=16M
      --max-heap-table-size=16M
      --host-cache-size=0
      --skip-name-resolve
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - dialog-mysql-data:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u root -p${MYSQL_ROOT_PASSWORD}
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: dialog-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - dialog-redis-data:/data

volumes:
  dialog-mysql-data:
  dialog-redis-data:
  dialog-certs:
  dialog-caddy-data:
